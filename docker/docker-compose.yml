services:
  onecli:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      vault-init:
        condition: service_completed_successfully
    ports:
      - "10254:10254"
      - "10255:10255"
    volumes:
      - onecli-data:/app/data
    env_file: ../.env
    environment:
      SECRET_PROVIDER: ${SECRET_PROVIDER:-vault_hcp}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
      VAULT_KV_PREFIX: ${VAULT_KV_PREFIX:-onecli}

  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: vault server -dev -dev-root-token-id=${VAULT_DEV_ROOT_TOKEN_ID:-root} -dev-listen-address=0.0.0.0:8200
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "vault status -address=http://127.0.0.1:8200 >/dev/null 2>&1; code=$$?; [ $$code -eq 0 ] || [ $$code -eq 2 ]",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  vault-init:
    image: hashicorp/vault:1.18
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-ec"]
    command: |
      export VAULT_ADDR=http://vault:8200
      export VAULT_TOKEN=${VAULT_DEV_ROOT_TOKEN_ID:-root}

      vault status

      if ! vault secrets list | grep -q '^secret/'; then
        vault secrets enable -path=secret kv-v2
      fi

      # Initialize a bootstrap entry so the mount and permissions are validated.
      vault kv put secret/onecli/bootstrap value=ok >/dev/null

  vault-prod:
    image: hashicorp/vault:1.18
    profiles: ["vault-prod"]
    cap_add:
      - IPC_LOCK
    ports:
      - "18200:8200"
    command: vault server -config=/vault/config/vault-prod.hcl
    volumes:
      - vault-prod-data:/vault/file
      - vault-prod-bootstrap:/vault/bootstrap
      - ./vault/vault-prod.hcl:/vault/config/vault-prod.hcl:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "vault status -address=http://127.0.0.1:8200 >/dev/null 2>&1; code=$$?; [ $$code -eq 0 ] || [ $$code -eq 2 ]",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  vault-prod-init:
    image: hashicorp/vault:1.18
    profiles: ["vault-prod"]
    depends_on:
      vault-prod:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "/vault/bootstrap-scripts/init-prod.sh"]
    environment:
      VAULT_ADDR: http://vault-prod:8200
      VAULT_BOOTSTRAP_DIR: /vault/bootstrap
    volumes:
      - vault-prod-bootstrap:/vault/bootstrap
      - ./vault/init-prod.sh:/vault/bootstrap-scripts/init-prod.sh:ro

  quick-agent:
    image: curlimages/curl:8.12.1
    profiles: ["quick-agent"]
    depends_on:
      onecli:
        condition: service_started
    restart: "no"
    entrypoint: ["/bin/sh", "/scripts/quick-agent.sh"]
    env_file: ../.env
    environment:
      GATEWAY_PROXY: http://onecli:10255
      CA_CERT: /onecli-data/gateway/ca.pem
    volumes:
      - onecli-data:/onecli-data:ro
      - ./quick-agent.sh:/scripts/quick-agent.sh:ro

  quick-agent-vault-prod:
    image: curlimages/curl:8.12.1
    profiles: ["vault-prod"]
    depends_on:
      onecli-vault-prod:
        condition: service_started
    restart: "no"
    entrypoint: ["/bin/sh", "/scripts/quick-agent.sh"]
    env_file: ../.env
    environment:
      GATEWAY_PROXY: http://onecli-vault-prod:10255
      CA_CERT: /onecli-data/gateway/ca.pem
    volumes:
      - onecli-data:/onecli-data:ro
      - ./quick-agent.sh:/scripts/quick-agent.sh:ro

  onecli-vault-prod:
    profiles: ["vault-prod"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      vault-prod-init:
        condition: service_completed_successfully
    user: "0:0"
    ports:
      - "10254:10254"
      - "10255:10255"
    volumes:
      - onecli-data:/app/data
      - vault-prod-bootstrap:/vault/bootstrap:ro
      - ./onecli-vault-prod-entrypoint.sh:/app/onecli-vault-prod-entrypoint.sh:ro
    env_file: ../.env
    environment:
      SECRET_PROVIDER: ${SECRET_PROVIDER:-vault_hcp}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault-prod:8200}
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
      VAULT_KV_PREFIX: ${VAULT_KV_PREFIX:-onecli}
      VAULT_BOOTSTRAP_DIR: /vault/bootstrap
      VAULT_TOKEN_FILE: /vault/bootstrap/root_token
    entrypoint: ["/bin/sh", "/app/onecli-vault-prod-entrypoint.sh"]

volumes:
  onecli-data:
  vault-prod-data:
  vault-prod-bootstrap:
