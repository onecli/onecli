services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onecli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onecli}
      POSTGRES_DB: ${POSTGRES_DB:-onecli}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onecli}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - onecli

  app:
    image: ghcr.io/onecli/onecli:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "10254:10254"
      - "10255:10255"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-onecli}:${POSTGRES_PASSWORD:-onecli}@postgres:5432/${POSTGRES_DB:-onecli}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
    volumes:
      - app-data:/app/data
    env_file:
      - path: ../.env
        required: false
    networks:
      - onecli

volumes:
  pgdata:
  app-data:

networks:
  onecli:
    driver: bridge
